# Basic Site Settings
locale           : "en-US"
site_theme       : "default"
title            : "Muhammad Umer Naeem"
title_separator  : "-"
name             : &name "Muhammad Umer Naeem"
description      : &description "PhD Student in Economics specializing in Environmental Policy and Data Science."
url              : "https://umernaeem1.github.io"
baseurl          : ""
repository       : "umernaeem1/umernaeem1.github.io"

# Site Author
author:
  avatar         : "profile.png" # Make sure your photo in assets/images is named profile.png
  name           : "Muhammad Umer Naeem"
  bio            : "PhD Student in Economics trying to answer strange questions."
  location       : "United States" # Or your specific city/university location
  employer       : "PhD Student"
  email          : "" # Add your university email here
  
  # Academic profiles
  googlescholar  : "https://scholar.google.com/citations?user=GLhOfrwAAAAJ&hl=en"
  github         : "umernaeem1?tab=repositories"
  linkedin       : "umer-naeem-20888785"

# Publication Category Headings
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
breadcrumbs      : false
words_per_minute : 160
future           : true
read_more        : "disabled"
talkmap_link     : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json*
  - README
  - vendor

# Conversion & Markdown
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections (Research, Teaching, Portfolio)
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Default Layouts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC
